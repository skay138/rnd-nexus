services:

  redis:
    image: redis/redis-stack-server:7.2.0-v14
    container_name: rnd_redis
    ports:
      - "6379:6379"
    environment:
      - REDIS_MAXMEMORY=256mb
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  mariadb:
    image: mariadb:11.4
    container_name: rnd_mariadb
    ports:
      - "3306:3306"
    environment:
      MARIADB_ROOT_PASSWORD: root_password
      MARIADB_DATABASE: rnd_nexus
      MARIADB_USER: rnd
      MARIADB_PASSWORD: rnd_password
    volumes:
      - rnd_mariadb_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 10s
      timeout: 5s
      retries: 10

  # ── LLM 서버 (둘 중 하나 선택) ───────────────────────────────────────────────
  # 개발: docker compose --profile ollama up
  # 운영: docker compose --profile triton up

  ollama:
    profiles: ["ollama"]
    image: ollama/ollama:latest
    container_name: rnd_ollama
    ports:
      - "11430:11434"
    volumes:
      - rnd_ollama_data:/root/.ollama
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]

  triton:
    profiles: ["triton"]
    image: nvcr.io/nvidia/tritonserver:25.01-vllm-python-py3
    container_name: rnd_triton
    ports:
      - "8010:8000"   # HTTP — OpenAI-compat /v1/chat/completions
      - "8011:8001"   # gRPC
      - "8012:8002"   # Metrics
    volumes:
      - ./model_repository:/models
      - ${HF_HOME:-~/.cache/huggingface}:/root/.cache/huggingface
    command: >
      tritonserver
      --model-repository=/models
      --model-control-mode=explicit
      --load-model=qwen3-32b
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/v2/health/ready"]
      interval: 30s
      timeout: 10s
      retries: 10
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]

  # ── Neo4j (그래프 DB) ──────────────────────────────────────────────────────
  neo4j:
    image: neo4j:5.18-community
    container_name: rnd_neo4j
    ports:
      - "7474:7474"    # Browser
      - "7687:7687"    # Bolt
    environment:
      NEO4J_AUTH: neo4j/rnd_password
      NEO4J_PLUGINS: '["apoc"]'
      NEO4J_dbms_memory_heap_initial__size: 512m
      NEO4J_dbms_memory_heap_max__size: 1g
    volumes:
      - rnd_neo4j_data:/data
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:7474"]
      interval: 10s
      timeout: 5s
      retries: 10

  # ── Milvus 스택 (etcd + minio + milvus) ───────────────────────────────────
  etcd:
    image: quay.io/coreos/etcd:v3.5.5
    container_name: rnd_etcd
    environment:
      ETCD_AUTO_COMPACTION_MODE: revision
      ETCD_AUTO_COMPACTION_RETENTION: "1000"
      ETCD_QUOTA_BACKEND_BYTES: "4294967296"
      ETCD_SNAPSHOT_COUNT: "50000"
    command: >
      etcd
      --advertise-client-urls=http://etcd:2379
      --listen-client-urls=http://0.0.0.0:2379
      --data-dir=/etcd
    volumes:
      - rnd_etcd_data:/etcd
    healthcheck:
      test: ["CMD", "etcdctl", "endpoint", "health"]
      interval: 10s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio:RELEASE.2023-03-20T20-16-18Z
    container_name: rnd_minio
    environment:
      MINIO_ACCESS_KEY: minioadmin
      MINIO_SECRET_KEY: minioadmin
    command: minio server /minio_data --console-address ":9001"
    ports:
      - "9001:9001"    # Console
    volumes:
      - rnd_minio_data:/minio_data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5

  milvus:
    image: milvusdb/milvus:v2.6.0
    container_name: rnd_milvus
    command: ["milvus", "run", "standalone"]
    ports:
      - "19530:19530"  # gRPC
      - "9091:9091"    # HTTP
    environment:
      ETCD_ENDPOINTS: etcd:2379
      MINIO_ADDRESS: minio:9000
    volumes:
      - rnd_milvus_data:/var/lib/milvus
    depends_on:
      etcd:
        condition: service_healthy
      minio:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9091/healthz"]
      interval: 15s
      timeout: 10s
      retries: 10

  attu:
    image: zilliz/attu:v2.4
    container_name: rnd_attu
    ports:
      - "3000:3000"
    environment:
      MILVUS_URL: milvus:19530
    depends_on:
      milvus:
        condition: service_healthy

  mcp-server:
    build:
      context: .
      dockerfile: mcp-server/Dockerfile
    container_name: rnd_mcp_server
    env_file:
      - .env
    environment:
      MARIADB_URL: mysql+pymysql://rnd:rnd_password@mariadb:3306/rnd_nexus
      MILVUS_HOST: milvus
      NEO4J_URI: bolt://neo4j:7687
      NEO4J_USERNAME: neo4j
      NEO4J_PASSWORD: rnd_password
      RND_LOG_LEVEL: DEBUG
    ports:
      - "8000:8000"
    depends_on:
      mariadb:
        condition: service_healthy
      milvus:
        condition: service_healthy
      neo4j:
        condition: service_healthy

  ai-server:
    build:
      context: .
      dockerfile: ai-server/Dockerfile
    container_name: rnd_ai_server
    env_file:
      - .env
    environment:
      REDIS_URL: redis://redis:6379
      LLM_BASE_URL: http://triton:8000/v1
      LLM_PROVIDER: openai
      LLM_API_KEY: EMPTY
      MCP_SERVER_URL: http://mcp-server:8000/sse
      MARIADB_URL: mysql+pymysql://rnd:rnd_password@mariadb:3306/rnd_nexus
      API_HOST: "0.0.0.0"
      API_PORT: "8080"
      RND_LOG_LEVEL: DEBUG
    ports:
      - "8080:8080"    # Web UI + API
    depends_on:
      redis:
        condition: service_healthy
      mariadb:
        condition: service_healthy
      mcp-server:
        condition: service_started
    stdin_open: true
    tty: true

volumes:
  rnd_ollama_data:
  rnd_mariadb_data:
  rnd_neo4j_data:
  rnd_etcd_data:
  rnd_minio_data:
  rnd_milvus_data:
